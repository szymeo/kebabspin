<!DOCTYPE html>
<html>

<head>
	<meta charset="utf-8">
	<link rel="stylesheet" type="text/css" href="https://fonts.googleapis.com/css?family=Open+Sans|Oswald">
	<style type="text/css">
		.center-div {
			position: absolute;
			margin: auto;
			top: 0;
			right: 0;
			bottom: 0;
			left: 0;
			width: 190px;
			height: 120px;
			border-radius: 50px;
			border-color: white;
			margin: 100px 100px;
		}

		.center {
			display: -webkit-box;
			display: -moz-box;
			display: -ms-flexbox;
			display: -webkit-flex;
			display: flex;
			-webkit-box-direction: normal;
			-moz-box-direction: normal;
			-webkit-box-orient: horizontal;
			-moz-box-orient: horizontal;
			-webkit-flex-direction: row;
			-ms-flex-direction: row;
			flex-direction: row;
			-webkit-flex-wrap: nowrap;
			-ms-flex-wrap: nowrap;
			flex-wrap: nowrap;
			-webkit-box-pack: center;
			-moz-box-pack: center;
			-webkit-justify-content: center;
			-ms-flex-pack: center;
			justify-content: center;
			-webkit-align-content: stretch;
			-ms-flex-line-pack: stretch;
			align-content: stretch;
			-webkit-box-align: center;
			-moz-box-align: center;
			-webkit-align-items: center;
			-ms-flex-align: center;
			align-items: center;
		}

		div.a {
			width: 100px;
			height: 100px;
			content: url(./img/mc-hammer.gif);
			position: fixed;

		}

		#image {
			margin: 100px 100px;
			position: absolute;
			width: 20%;
			height: 20%;
			margin: auto;
			top: 0;
			left: 0;
			right: 0;
			bottom: 0;
		}

		.results {
			position: absolute;
			top: 20px;
			left: 0;
			right: 0;
			text-align: center;
			color: white;
			font-family: 'Oswald', sans-serif;
			font-size: 32px;
			text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
			z-index: 10;
			pointer-events: none;
		}

		.modal-div {
			position: absolute;
			padding: 10px;
			max-width: 200px;
			background-color: #fff;
		}

		#play-btn {
			position: fixed;
			top: 50%;
			left: 50%;
			transform: translate(-50%, -50%);
			z-index: 100;
			padding: 20px 40px;
			font-size: 24px;
			font-family: 'Oswald', sans-serif;
			background: rgba(255,255,255,0.9);
			border: none;
			border-radius: 10px;
			cursor: pointer;
			box-shadow: 0 4px 20px rgba(0,0,0,0.3);
		}
		#play-btn:hover {
			background: #fff;
		}

		body {
			background: linear-gradient(-45deg, #EE7752, #E73C7E, #23A6D5, #23D5AB);
			background-size: 400% 400%;
			-webkit-animation: Gradient 15s ease infinite;
			-moz-animation: Gradient 15s ease infinite;
			animation: Gradient 15s ease infinite;
			overflow: hidden;
		}

		@-webkit-keyframes Gradient {
			0% {
				background-position: 0% 50%
			}
			50% {
				background-position: 100% 50%
			}
			100% {
				background-position: 0% 50%
			}
		}

		@-moz-keyframes Gradient {
			0% {
				background-position: 0% 50%
			}
			50% {
				background-position: 100% 50%
			}
			100% {
				background-position: 0% 50%
			}
		}

		@keyframes Gradient {
			0% {
				background-position: 0% 50%
			}
			50% {
				background-position: 100% 50%
			}
			100% {
				background-position: 0% 50%
			}
		}
	</style>
	<title>kebab spin</title>
	<script type="text/javascript" src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.2.1/jquery.min.js"></script>
	<script type="text/javascript" src="./js/dancingturek.js"></script>
	<img src="img/kebab.png" id="image">
</head>

<body>
	<button id="play-btn" onclick="document.getElementById('yt-player').src='https://www.youtube.com/embed/IFP3Jc5ztgg?autoplay=1&loop=1&playlist=IFP3Jc5ztgg';this.remove()">dej muzyke</button>
	<iframe id="yt-player" width="0" height="0" src="https://www.youtube.com/embed/IFP3Jc5ztgg?loop=1&playlist=IFP3Jc5ztgg" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>

	<div class="a">
	</div>
	<div class="center-div">
		<div class="results"></div>
	</div>
	<div class="content">
<script type="text/javascript">
var totalDeg = 0;
var $image = $("#image");

function rotateStep() {
	totalDeg++;
	$image.css('transform', 'rotate(' + (totalDeg % 360) + 'deg)');

	if (totalDeg % 360 === 0) {
		rotation();
	}

	requestAnimationFrame(rotateStep);
}

function randomIntFromInterval(min, max) {
	return Math.floor(Math.random() * (max - min + 1) + min);
}

var rotation = function () {
	rotation.calledTimes++;
	$('.results').html("ILOŚĆ OBROTÓW KEBABA " + rotation.calledTimes);

	if (rotation.calledTimes % 10 !== 0) return;

	var cars = [
		"JEDZIEMY Z TYM KEBSEM!",
		"TEN SŁODKI KEBAB, CO OTUMANIA MI ZMYSŁY",
		"KUPUJĄC KEBABA OSIEDLASZ ROZKOSZ W SWOIM BRZUSZKU!",
		"KOCHAM TEN STAN, KIEDY MAM OSTRY SOS NA JĘZORZE",
		"MOC, ENERGIA, KAPSAICYNA!",
		"DID YOU KNOW THAT KEBAB IN POLISH IS ZAJEBISTEŻAREŁKO",
		"YOU SPIN ME RIGHT ROUND, BABY RIGHT ROUND LIKE A KEBAB, BABY RIGHT ROUND ROUND ROUND",
		"DOBRY KEBAB TO JEST TO!"
	];

	var idx = Math.floor(rotation.calledTimes / 10) - 1;
	if (idx < 0 || idx >= cars.length) return;

	var div = document.createElement("div");
	div.className = "modal-div";
	div.style.left = randomIntFromInterval(0, window.innerWidth - 220) + 'px';
	div.style.top = randomIntFromInterval(0, window.innerHeight - 50) + 'px';
	div.innerHTML = cars[idx];
	document.body.appendChild(div);
};

rotation.calledTimes = 0;
$('.results').html("ILOŚĆ OBROTÓW KEBABA 0");
rotateStep();
</script>

</div>

</body>
</html>
